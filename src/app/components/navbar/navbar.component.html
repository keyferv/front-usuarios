<header class="navbar-shell">
  <div class="navbar-inner">
    <div class="navbar-top">
      <a routerLink="/dashboard" class="brand-link" aria-label="Ir al tablero">
        <span class="brand-mark">
          <mat-icon>work</mat-icon>
        </span>
        <span class="brand-text">Empleos</span>
      </a>

      <div class="top-actions" *ngIf="isAuthenticated$ | async; else guestAction">
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-trigger" aria-label="Abrir menu de usuario">
          <span class="user-avatar">{{ username?.charAt(0) }}</span>
          <span class="user-name">{{ username }}</span>
          <mat-icon>expand_more</mat-icon>
        </button>
      </div>

      <ng-template #guestAction>
        <button mat-raised-button routerLink="/login" class="banner-btn banner-btn--primary">
          <mat-icon>login</mat-icon>
          <span>Iniciar Sesión</span>
        </button>
      </ng-template>
    </div>
  </div>
</header>

<div class="page-nav-wrap" *ngIf="isAuthenticated$ | async">
  <div class="page-nav-inner">
    <nav class="nav-scroller" aria-label="Navegación principal">
      <div class="nav-pills">
        <a mat-button routerLink="/dashboard" routerLinkActive="active" class="nav-pill">
          <mat-icon>trending_up</mat-icon>
          <span>Tablero</span>
        </a>
        <a mat-button routerLink="/vacantes" routerLinkActive="active" class="nav-pill">
          <mat-icon>work_outline</mat-icon>
          <span>Vacantes</span>
        </a>
        <a mat-button routerLink="/solicitudes" routerLinkActive="active" class="nav-pill">
          <mat-icon>description</mat-icon>
          <span>Solicitudes</span>
        </a>
        <a mat-button routerLink="/profile" routerLinkActive="active" class="nav-pill">
          <mat-icon>person_outline</mat-icon>
          <span>Perfil</span>
        </a>
      </div>
    </nav>
  </div>
</div>

<mat-menu #userMenu="matMenu" yPosition="below" [overlapTrigger]="false" panelClass="user-menu-panel">
  <button mat-menu-item (click)="logout()" class="menu-item-logout">
    <mat-icon>logout</mat-icon>
    <span>Cerrar Sesión</span>
  </button>
</mat-menu>
